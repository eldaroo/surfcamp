services:
  surfcamp:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_LINK_GENERATOR_URL: ${NEXT_PUBLIC_LINK_GENERATOR_URL:-http://localhost:3010}
    ports:
      - "3001:3000"
