name: Build and Deploy Surfcamp

# Required GitHub secrets:
#   INFRA_READ_TOKEN         – Fine-grained PAT with read access to neozero86/infrastructure
#   NOMAD_TOKEN              – Nomad management token
#   GHCR_READ_TOKEN          – Classic PAT with read:packages scope for Nomad image pulls
#   LOBBYPMS_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_PUBLISHABLE_KEY
#   DATABASE_URL              – PostgreSQL connection string (Nomad internal)
#   WETRAVEL_API_KEY
#   WETRAVEL_WEBHOOK_SECRET
#   BREVO_API_KEY
#   GREEN_API_INSTANCE
#   GREEN_API_TOKEN
#
# Required GitHub variables (Settings → Variables):
#   NOMAD_ADDR               – Nomad server URL


on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout infrastructure
        uses: actions/checkout@v4
        with:
          repository: neozero86/infrastructure
          path: _infra
          token: ${{ secrets.INFRA_READ_TOKEN }}

      - name: Collect deploy metadata
        id: meta
        run: |
          echo "value<<__META_EOF__" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "deployed_by=${{ github.actor }}" >> "$GITHUB_OUTPUT"
          echo "__META_EOF__" >> "$GITHUB_OUTPUT"

      - uses: ./_infra/.github/actions/nomad-deploy
        with:
          project_name: surfcamp
          nomad_token:  ${{ secrets.NOMAD_TOKEN }}
          nomad_addr:   ${{ vars.NOMAD_ADDR }}
          ghcr_token:   ${{ secrets.GHCR_READ_TOKEN }}
          build_args: |
            NEXT_PUBLIC_BASE_URL=https://surfcamp.mdlautomations.duckdns.org
            NEXT_PUBLIC_LINK_GENERATOR_URL=https://links.surfcamp.mdlautomations.duckdns.org
            CACHE_BUST=${{ github.sha }}

          project_secrets: |
            LOBBYPMS_API_KEY=${{ secrets.LOBBYPMS_API_KEY }}
            LOBBYPMS_API_URL=${{ vars.LOBBYPMS_API_URL }}
            DEV_RESERVE_BASE_URL=${{ vars.DEV_RESERVE_BASE_URL }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            WETRAVEL_API_KEY=${{ secrets.WETRAVEL_API_KEY }}
            WETRAVEL_WEBHOOK_SECRET=${{ secrets.WETRAVEL_WEBHOOK_SECRET }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            GREEN_API_INSTANCE=${{ secrets.GREEN_API_INSTANCE }}
            GREEN_API_TOKEN=${{ secrets.GREEN_API_TOKEN }}
          deploy_meta: ${{ steps.meta.outputs.value }}
